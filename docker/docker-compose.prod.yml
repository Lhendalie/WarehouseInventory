version: '3.8'

services:
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "80:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__DefaultConnection=Host=db;Database=warehouseinventory;Username=postgres;Password=CHANGE_THIS_PASSWORD
    depends_on:
      - db
    restart: unless-stopped
    networks:
      - warehouse-network

  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=warehouseinventory
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=CHANGE_THIS_PASSWORD
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - warehouse-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:

networks:
  warehouse-network:
    driver: bridge
